; Waveshare ESP32-S3-Touch-LCD-1.28 + 1.28" round GC9A01 (240×240)
; Board in Arduino IDE: "ESP32S3 Dev Module"
; (Originally targeted an ESP32-C3 Super Mini; retargeted to the S3 board —
;  same GC9A01 display, different MCU/pins. See include/config.h for the pinout.)

[env:supermini]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
extra_scripts = post:scripts/merge_firmware.py

; Anti-aliased VLW font (Noto Sans Bold 15, from TFT_eSPI smooth-font examples)
board_build.embed_files = data/ui_font.vlw

; Serial console over the board's CH343 USB-UART bridge (UART0 -> COM port).
; CDC_ON_BOOT=0 keeps Serial on UART0 so `pio device monitor` shows logs.
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=0
  -DWM_NODEBUG
  -DWM_MDNS

lib_deps =
  lovyan03/LovyanGFX@^1.2.7
  tzapu/WiFiManager@^2.0.17
  bblanchon/ArduinoJson@^7.4.2
